# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml

      public class Factorial {
 public static long factorial(int n) {
 if (n < 0) {
 throw new IllegalArgumentException("Число должно быть неотрицательным");
}
 long result = 1;
 for (int i = 1; i <= n; i++) {
 result *= i;
}
 return result;
}
}

public class TriangleArea {
 public static double area(double base, double height) {
 if (base <= 0 || height <= 0) {
 throw new IllegalArgumentException("Основание и высота должны быть положительными");
}
 return 0.5 * base * height;
}

public class ArithmeticOperations {
 public static int add(int a, int b) {
 return a + b;
}

 public static int subtract(int a, int b) {
 return a – b;
}

 public static int multiply(int a, int b) {
 return a * b;
}

 public static double divide(int a, int b) {
 if (b == 0) {
 throw new ArithmeticException("Деление на ноль");
}
 return (double) a / b;
}
}

public class CompareNumbers {
 public static String compare(int a, int b) {
 if (a > b) {
 return "Первое число больше";
} else if (a < b) {
 return "Второе число больше";
} else {
 return "Числа равны";
}
}
}
}
class FactorialTest {
 @Test
 void testFactorialPositive() {
 assertEquals(120, Factorial.Factorial(5));
}

 @Test
 void testFactorialZero() {
 assertEquals(1, Factorial.Factorial(0));
}

 @Test
 void testFactorialNegative() {
 assertThrows(IllegalArgumentException, () -> Factorial.Factorial(-1));
}
}

class TriangleAreaTest {
 @Test
 void testAreaPositive() {
